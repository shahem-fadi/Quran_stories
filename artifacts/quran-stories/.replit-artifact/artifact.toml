kind = "web"
previewPath = "/"
title = "Quran Stories"
version = "1.0.0"
id = "artifacts/quran-stories"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20503

[services.development]
run = "pnpm --filter @workspace/quran-stories run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-stories", "run", "build" ]
serve = "static"
publicDir = "artifacts/quran-stories/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20503"
BASE_PATH = "/"
